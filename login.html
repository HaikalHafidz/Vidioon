<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk – Vidioon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="frontend/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" id="loginCard">
    <a href="index.html" class="logo"><span class="logo-icon">🎬</span>VIDIOON</a>
    <h2>Selamat datang kembali</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="kamu@email.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••"/>
    </div>
    <button class="btn-submit" onclick="doLogin()">Masuk</button>
    <p class="auth-footer">Masuk hanya untuk admin. Kontak pengelola untuk kredensial.</p>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="app.js"></script>
<script>
async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) { showToast('Isi semua field!', 'error'); return; }
  
  try {
    const res = await fetch('http://localhost:3000/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('vidioon_token', data.token);
      const userName = data.user?.name || data.user?.email?.split('@')[0] || 'User';
      localStorage.setItem('vidioon_user', userName);
      localStorage.setItem('vidioon_role', data.user?.role || 'user');
      showToast('Berhasil masuk! 🎬', 'success');
      setTimeout(() => {
        if (data.user?.role === 'admin') window.location = 'admin.html';
        else window.location = 'index.html';
      }, 1000);
    } else {
      showToast(data.message || 'Login gagal', 'error');
    }
  } catch(e) {
    showToast('Gagal terhubung ke server.', 'error');
  }
}
addToastContainer && addToastContainer();
</script>
</body>
</html>
