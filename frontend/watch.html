<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tonton – Vidioon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="watch-page">

<nav class="navbar solid" id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-icon">🎬</span>VIDIOON</a>
    <ul class="nav-links">
      <li><a href="../index.html">Beranda</a></li>
      <li><a href="../movies.html">Film</a></li>
      <li><a href="../series.html">Serial</a></li>
      <li><a href="../anime.html">Anime</a></li>
    </ul>
    <div class="nav-actions">
      <a href="../login.html" class="btn-nav">Masuk</a>
    </div>
  </div>
</nav>

<div style="padding-top:var(--nav-h)">
  <!-- VIDEO PLAYER -->
  <div class="video-wrapper" style="background:#000">
    <iframe id="mainPlayer" src="" allowfullscreen scrolling="no" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; encrypted-media" style="width:100%;height:100%;min-height:70vh;display:block"></iframe>
  </div>

  <!-- SERVER TABS -->
  <div class="video-info">
    <h1 id="watchTitle">Memuat...</h1>
    <div class="meta" id="watchMeta"></div>

    <h3 style="font-size:14px;color:var(--text2);margin-bottom:0.75rem">Pilih Server:</h3>
    <div class="server-tabs" id="serverTabs">
      <span style="color:var(--text3);font-size:13px">Memuat server...</span>
    </div>

    <p id="watchDesc" style="color:var(--text2);font-size:14px;max-width:800px;line-height:1.7;margin-bottom:2rem"></p>

    <!-- RELATED -->
    <h2 class="row-title">Mungkin Kamu Suka</h2>
    <div class="row-scroll" id="relatedRow"></div>
  </div>
</div>

<!-- AD BANNER (placeholder) -->
<div style="background:var(--bg2);border:1px dashed rgba(255,255,255,0.08);border-radius:8px;padding:1rem;text-align:center;color:var(--text3);font-size:12px;max-width:1400px;margin:1rem auto 2rem;"> Ruang Iklan – Dukung Vidioon agar tetap gratis! </div>

<footer class="footer" style="background:var(--bg2);border-top:1px solid rgba(255,255,255,0.05);padding:2rem;text-align:center;color:var(--text3);font-size:13px">
  <p>© 2024 Vidioon · <a href="../dmca.html" style="color:var(--text2)">DMCA</a> · <a href="../contact.html" style="color:var(--text2)">Kontak</a></p>
</footer>

<script src="app.js"></script>
<script>
  const embedServers = [];
  let currentMovie = null;

  document.addEventListener('DOMContentLoaded', () => {
    addToastContainer();
    setupEmbedServers();
    initWatchPage();
  });

  function setupEmbedServers() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const movie = allContent.find(m => m.id === id);
    const serverTabs = document.getElementById('serverTabs');

    if (!movie) {
      console.error('Film tidak ditemukan dengan ID:', id);
      document.getElementById('watchTitle').textContent = 'Film tidak ditemukan';
      if (serverTabs) serverTabs.innerHTML = '<span style="color:var(--text3);font-size:13px">Server tidak tersedia.</span>';
      return;
    }

    currentMovie = movie;
    const servers = [];

    if (movie.embed) servers.push({ label: 'Server 1 (Primary)', url: movie.embed });
    if (movie.embed2) servers.push({ label: 'Server 2', url: movie.embed2 });
    if (movie.embed3) servers.push({ label: 'Server 3', url: movie.embed3 });

    if (servers.length === 0) {
      servers.push({ label: 'Server 1 (2Embed)', url: `https://www.2embed.cc/embed/${id}` });
      servers.push({ label: 'Server 2 (VidSrc)', url: `https://vidsrc.to/embed/movie/${id}` });
      servers.push({ label: 'Server 3 (MultiEmbed)', url: `https://multiembed.mov/?video_id=${id}&tmdb=1` });
    }

    embedServers.length = 0;
    embedServers.push(...servers.map(s => s.url));

    if (serverTabs) {
      serverTabs.innerHTML = servers.map((server, index) => `
        <button class="server-tab${index === 0 ? ' active' : ''}" data-server-index="${index}">${server.label}</button>
      `).join('');
      serverTabs.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', () => switchServer(parseInt(button.dataset.serverIndex, 10), button));
      });
    }

    if (embedServers[0]) {
      document.getElementById('mainPlayer').src = embedServers[0];
    }
  }

  function switchServer(idx, btn) {
    if (!embedServers[idx]) return;
    document.querySelectorAll('#serverTabs .server-tab').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('mainPlayer').src = embedServers[idx];
    showToast(`Beralih ke ${idx + 1}`, 'success');
  }
</script>
</body>
</html>
